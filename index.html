<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Scorecard Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Roboto:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto', sans-serif;
      background: #1a1a2e;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: .05em;
      margin-bottom: 2rem;
      color: #fff;
    }
    .container { width: 100%; max-width: 760px; display: flex; flex-direction: column; gap: 1.5rem; }
    .controls {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .ctrl-row { display: flex; flex-direction: column; gap: 5px; }
    .ctrl-row.full { grid-column: 1 / -1; }
    label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: rgba(255,255,255,0.5); }
    input[type=text], input[type=number], select {
      width: 100%; padding: 8px 12px; font-size: 14px;
      font-family: 'Roboto', sans-serif;
      background: rgba(255,255,255,0.08); color: #fff;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; outline: none;
      transition: border-color .2s;
    }
    input[type=text]:focus, input[type=number]:focus, select:focus { border-color: rgba(255,255,255,0.4); }
    select option { background: #1a1a2e; }
    input[type=color] {
      width: 44px; height: 36px;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
      cursor: pointer; padding: 2px; background: rgba(255,255,255,0.08);
    }
    .color-row { display: flex; gap: 10px; align-items: center; }
    .color-label { font-size: 13px; color: rgba(255,255,255,0.55); }
    .preview-wrap {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 1.5rem;
    }
    .preview-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .07em; color: rgba(255,255,255,0.4); margin-bottom: 12px;
    }
    .checker {
      background: repeating-conic-gradient(#666 0% 25%, #999 0% 50%) 0 0 / 16px 16px;
      border-radius: 10px; padding: 16px; display: inline-block;
    }
    #scorecard-canvas { display: block; max-width: 100%; }
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
    button {
      padding: 10px 22px; font-size: 14px; font-family: 'Roboto', sans-serif; font-weight: 600;
      border-radius: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08); color: #fff; transition: background .15s;
    }
    button:hover { background: rgba(255,255,255,0.15); }
    button.primary { background: #fff; color: #111; border-color: #fff; }
    button.primary:hover { background: #e0e0e0; }

    /* ── Color history ── */
    .theme-history {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .theme-history-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .07em; color: rgba(255,255,255,0.4);
    }
    .theme-swatches {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .theme-swatch {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .theme-swatch:hover {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.12);
    }
    .swatch-dots {
      display: flex;
      gap: 4px;
    }
    .swatch-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2);
    }
    .swatch-text {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      font-family: 'Roboto', sans-serif;
    }
    .theme-empty {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>⛳ Golf Scorecard Generator</h1>
  <div class="container">
    <div class="controls">
      <div class="ctrl-row full">
        <label>Player name</label>
        <input type="text" id="playerName" value="서영건">
      </div>
      <div class="ctrl-row">
        <label>Hole</label>
        <input type="number" id="holeNum" value="8" min="1" max="18">
      </div>
      <div class="ctrl-row">
        <label>Par</label>
        <select id="parVal">
          <option value="3">Par 3</option>
          <option value="4" selected>Par 4</option>
          <option value="5">Par 5</option>
        </select>
      </div>
      <div class="ctrl-row">
        <label>Strokes (this hole)</label>
        <input type="number" id="strokeVal" value="5" min="1" max="15">
      </div>
      <div class="ctrl-row">
        <label>Overall score</label>
        <input type="text" id="overallScore" value="-10" placeholder="-5, +2, E …">
      </div>
      <div class="ctrl-row">
        <label>Yards / Distance</label>
        <input type="number" id="yardsVal" value="445" min="50" max="700">
      </div>
      <div class="ctrl-row full">
        <label>Accent color (badge & strip)</label>
        <div class="color-row">
          <input type="color" id="accentColor" value="#7dd3e8">
          <span class="color-label">Score badge & top strip</span>
        </div>
      </div>
      <div class="ctrl-row full">
        <label>Card background</label>
        <div class="color-row">
          <input type="color" id="bgColor" value="#111111">
          <span class="color-label">Main card color</span>
        </div>
      </div>
    </div>

    <div class="preview-wrap">
      <div class="preview-label">Preview — checkerboard = transparent</div>
      <div class="checker">
        <canvas id="scorecard-canvas"></canvas>
      </div>
    </div>

    <div class="btn-row">
      <button class="primary" onclick="exportPNG(true)">⬇ Export PNG (transparent bg)</button>
      <button onclick="exportPNG(false)">⬇ Export PNG (with bg)</button>
    </div>

    <div class="theme-history">
      <div class="theme-history-label">Recent color themes (click to apply)</div>
      <div class="theme-swatches" id="themeSwatches">
        <span class="theme-empty">No saved themes yet — export a PNG to save the current theme.</span>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('scorecard-canvas');
    const ctx    = canvas.getContext('2d');

    // ── Constants ──
    const FS          = 28;
    const HOLE_LBL_FS = 11;
    const HOLE_NUM_FS = 22;
    const DOT_FS      = 11;
    const SUB_FS      = 13;
    const TOP_VPAD    = 10;
    const SUB_VPAD    = 5;
    const STRIP_H     = 4;
    const TOP_H       = FS + TOP_VPAD * 2;   // 48px
    const SUB_H       = SUB_FS + SUB_VPAD * 2; // 23px
    const R           = 10;
    const HPAD        = 14;
    const DOT_GAP     = 18;
    const YDS_DOT_GAP = 30;
    const TOP_EXTRA   = 30;   // top box is wider than sub box by this amount

    // FIX 1: BADGE_W is fixed — never recalculated from score text
    const BADGE_W     = 90;
    // FIX 2: sub row width based on worst-case: par5 + max 8 strokes, fixed YDS width
    const MAX_DOTS    = 10;   // realistic max strokes shown
    const REF_YDS     = '000 YDS'; // fixed-width reference

    const FC     = '"Barlow Condensed", Impact, "Arial Narrow", sans-serif';
    const FW     = '800';
    const FK     = '"Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
    const ROBOTO = '"Roboto", sans-serif';

    let W = 400;
    let FIXED_W = null; // computed once after fonts load

    function lum(hex) {
      const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
      return (0.299*r + 0.587*g + 0.114*b) / 255;
    }

    function rrC(ctx, x, y, w, h, tl, tr, br, bl) {
      ctx.beginPath();
      ctx.moveTo(x+tl, y);
      ctx.lineTo(x+w-tr, y); ctx.quadraticCurveTo(x+w, y, x+w, y+tr);
      ctx.lineTo(x+w, y+h-br); ctx.quadraticCurveTo(x+w, y+h, x+w-br, y+h);
      ctx.lineTo(x+bl, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-bl);
      ctx.lineTo(x, y+tl); ctx.quadraticCurveTo(x, y, x+tl, y);
      ctx.closePath();
    }

    function drawVCentred(text, x, offsetY, boxH, font, fillStyle, align) {
      align = align || 'left';
      ctx.font = font; ctx.fillStyle = fillStyle;
      ctx.textAlign = align; ctx.textBaseline = 'alphabetic';
      const m  = ctx.measureText(text);
      const bl = offsetY + (boxH - (m.actualBoundingBoxAscent + m.actualBoundingBoxDescent)) / 2 + m.actualBoundingBoxAscent;
      ctx.fillText(text, x, bl);
    }

    function drawCentredOnPoint(text, cx, cy, font, fillStyle) {
      ctx.font = font;
      const m   = ctx.measureText(text);
      const asc = m.actualBoundingBoxAscent, desc = m.actualBoundingBoxDescent;
      ctx.fillStyle = fillStyle; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText(text, cx, cy + (asc + desc) / 2 - desc);
    }

    // Compute the FIXED canvas width once — based on worst-case values only.
    // This runs once after fonts load and never changes.
    function computeFixedWidth(name) {
      const tmp = document.createElement('canvas');
      const tc  = tmp.getContext('2d');
      const isKorean = /[\uAC00-\uD7A3]/.test(name);
      const NF = isKorean ? FK : FC;

      const FONT_NAME     = FW + ' ' + FS + 'px ' + NF;
      const FONT_HOLE_LBL = '700 ' + HOLE_LBL_FS + 'px ' + FC;
      const FONT_HOLE_NUM = FW + ' ' + HOLE_NUM_FS + 'px ' + FC;
      const FONT_SUB      = '600 ' + SUB_FS + 'px ' + ROBOTO;
      const FONT_DOTS     = '600 ' + DOT_FS + 'px ' + ROBOTO;

      // Hole block width (use '18' — widest 2-digit number)
      tc.font = FONT_HOLE_LBL; const holeLblW = tc.measureText('HOLE').width;
      tc.font = FONT_HOLE_NUM; const holeNumW = tc.measureText('18').width;
      const HOLE_BLOCK_W = Math.max(holeLblW, holeNumW) + HPAD * 2;

      // Name width (actual name — this is the only thing allowed to vary)
      tc.font = FONT_NAME; const nameW = tc.measureText(name).width;

      // Top row width (BADGE_W is fixed constant)
      const topContentW = HOLE_BLOCK_W + 1 + HPAD + nameW + 2 + BADGE_W;

      // Sub row: fixed YDS ref width + fixed MAX_DOTS
      tc.font = FONT_SUB;
      const parRefW = tc.measureText('PAR 5').width; // widest par label
      const ydsRefW = tc.measureText(REF_YDS).width; // fixed YDS width

      tc.font = FONT_DOTS;
      const dm   = tc.measureText('0');
      const cirR = Math.ceil(Math.max(dm.actualBoundingBoxAscent + dm.actualBoundingBoxDescent, dm.width) / 2) + 3;

      // FIX 2 & 3: sub row width never changes — fixed par, fixed yds, fixed max dots
      const subContentW = HPAD + parRefW + 10 + ydsRefW + YDS_DOT_GAP + MAX_DOTS * DOT_GAP + HPAD;

      const SUB_W = Math.max(subContentW, topContentW - TOP_EXTRA);
      const TOP_W = Math.max(topContentW, SUB_W + TOP_EXTRA);

      return { TOP_W, SUB_W, HOLE_BLOCK_W, cirR };
    }

    function render() {
      const name    = document.getElementById('playerName').value || '서영건';
      const hole    = parseInt(document.getElementById('holeNum').value)   || 8;
      const par     = parseInt(document.getElementById('parVal').value)     || 4;
      const yds     = parseInt(document.getElementById('yardsVal').value)   || 445;
      const strokes = Math.max(1, parseInt(document.getElementById('strokeVal').value) || par);
      const score   = document.getElementById('overallScore').value.trim() || 'E';
      const accent  = document.getElementById('accentColor').value;
      const bg      = document.getElementById('bgColor').value;

      const onAccent = lum(accent) > 0.45 ? '#000' : '#fff';
      const onBg     = lum(bg)     > 0.45 ? '#111' : '#fff';
      const dimOnBg  = lum(bg)     > 0.45 ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.4)';
      const isKorean = /[\uAC00-\uD7A3]/.test(name);
      const NF = isKorean ? FK : FC;

      const FONT_NAME     = FW + ' ' + FS + 'px ' + NF;
      const FONT_SCORE    = FW + ' ' + FS + 'px ' + FC;
      const FONT_HOLE_LBL = '700 ' + HOLE_LBL_FS + 'px ' + FC;
      const FONT_HOLE_NUM = FW + ' ' + HOLE_NUM_FS + 'px ' + FC;
      const FONT_SUB      = '600 ' + SUB_FS + 'px ' + ROBOTO;
      const FONT_DOTS     = '600 ' + DOT_FS + 'px ' + ROBOTO;

      const parTxt = ('PAR ' + par).toUpperCase();
      const yTxt   = (yds + ' YDS').toUpperCase();

      // Recompute fixed dims based on current name (only name changes W)
      const dims = computeFixedWidth(name);
      const TOP_W        = dims.TOP_W;
      const SUB_W        = dims.SUB_W;
      const HOLE_BLOCK_W = dims.HOLE_BLOCK_W;
      const cirR         = dims.cirR;
      W = TOP_W;

      const subOffsetX = Math.round((TOP_W - SUB_W) / 2);
      const totalDots  = Math.max(par, strokes);
      const lastDotCX  = subOffsetX + SUB_W - HPAD - cirR;
      const CARD_W     = TOP_W - BADGE_W;

      canvas.width  = W * 2;
      canvas.height = (TOP_H + SUB_H) * 2;
      canvas.style.width  = W + 'px';
      canvas.style.height = (TOP_H + SUB_H) + 'px';
      ctx.setTransform(1,0,0,1,0,0); ctx.scale(2,2);
      ctx.clearRect(0, 0, W, TOP_H + SUB_H);

      // 1. Full accent backing — top strip + badge bg
      ctx.fillStyle = accent;
      rrC(ctx, 0, 0, TOP_W, TOP_H, R, R, R, R);
      ctx.fill();

      // 2. Black card body — inset from top by STRIP_H
      ctx.fillStyle = bg;
      rrC(ctx, 0, STRIP_H, CARD_W, TOP_H - STRIP_H, R, 0, R, R);
      ctx.fill();

      // 3. Accent badge — fixed width, flat left, rounded right
      ctx.fillStyle = accent;
      rrC(ctx, CARD_W, 0, BADGE_W, TOP_H, 0, R, R, 0);
      ctx.fill();

      // 4. Sub box — smaller than top, centred, flat top, rounded bottom, 55% opacity
      ctx.save(); ctx.globalAlpha = 0.55; ctx.fillStyle = bg;
      rrC(ctx, subOffsetX, TOP_H, SUB_W, SUB_H, 0, 0, R, R);
      ctx.fill(); ctx.restore();

      // HOLE block
      const hCX    = HPAD + Math.max(
        ctx.measureText && (ctx.font = FONT_HOLE_LBL, ctx.measureText('HOLE').width) || 20,
        ctx.measureText && (ctx.font = FONT_HOLE_NUM, ctx.measureText(String(hole)).width) || 20
      ) / 2;

      const blackTop = STRIP_H;
      const blackH   = TOP_H - STRIP_H;

      ctx.font = FONT_HOLE_LBL; ctx.fillStyle = dimOnBg;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('HOLE', HPAD + (HOLE_BLOCK_W - HPAD*2)/2, blackTop + blackH * 0.28);

      ctx.font = FONT_HOLE_NUM; ctx.fillStyle = onBg;
      ctx.fillText(String(hole), HPAD + (HOLE_BLOCK_W - HPAD*2)/2, blackTop + blackH * 0.65);

      // Divider
      const divX = HOLE_BLOCK_W;
      ctx.strokeStyle = lum(bg) > 0.45 ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(divX, TOP_H*0.15); ctx.lineTo(divX, TOP_H*0.9); ctx.stroke();

      // Name + score
      ctx.letterSpacing = '2px';
      drawVCentred(name,  divX + HPAD,       STRIP_H, blackH, FONT_NAME,  onBg,     'left');
      ctx.letterSpacing = '0px';
      // FIX 3: score drawn centred in fixed BADGE_W — never resizes
      drawVCentred(score, TOP_W - BADGE_W/2, 0,       TOP_H,  FONT_SCORE, onAccent, 'center');

      // Sub row — actual par/yds text (display only, doesn't affect width)
      const tmp2 = document.createElement('canvas');
      const tc2  = tmp2.getContext('2d');
      tc2.font = FONT_SUB;
      const pW = tc2.measureText(parTxt).width;

      drawVCentred(parTxt, subOffsetX + HPAD,        TOP_H, SUB_H, FONT_SUB, onBg, 'left');
      drawVCentred(yTxt,   subOffsetX + HPAD + pW+10, TOP_H, SUB_H, FONT_SUB, onBg, 'left');

      // Dots — right-anchored, extra strokes push left, box never grows
      const subY = TOP_H + SUB_H / 2;
      for (let i = 1; i <= totalDots; i++) {
        const dx     = lastDotCX - (totalDots - i) * DOT_GAP;
        const dy     = subY;
        const active = i === strokes;
        if (active) {
          ctx.strokeStyle = onBg; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.arc(dx, dy, cirR, 0, Math.PI*2); ctx.stroke();
        }
        drawCentredOnPoint(String(i), dx, dy, FONT_DOTS, onBg);
      }
    }

    // ── Color theme history (saves up to 3 themes used at export) ──
    const THEME_KEY = 'scorecard_themes';

    function loadThemes() {
      try { return JSON.parse(localStorage.getItem(THEME_KEY) || '[]'); }
      catch(e) { return []; }
    }

    function saveTheme(accent, bg) {
      let themes = loadThemes();
      // Don't save duplicate of the most recent
      if (themes.length > 0 && themes[0].accent === accent && themes[0].bg === bg) return;
      // Remove existing duplicate anywhere in list
      themes = themes.filter(t => !(t.accent === accent && t.bg === bg));
      // Prepend new theme, keep max 3
      themes.unshift({ accent, bg });
      themes = themes.slice(0, 3);
      localStorage.setItem(THEME_KEY, JSON.stringify(themes));
      renderThemeSwatches();
    }

    function applyTheme(accent, bg) {
      document.getElementById('accentColor').value = accent;
      document.getElementById('bgColor').value = bg;
      render();
    }

    function renderThemeSwatches() {
      const container = document.getElementById('themeSwatches');
      const themes    = loadThemes();
      if (themes.length === 0) {
        container.innerHTML = '<span class="theme-empty">No saved themes yet — export a PNG to save the current theme.</span>';
        return;
      }
      container.innerHTML = themes.map((t, i) => `
        <button class="theme-swatch" onclick="applyTheme('${t.accent}','${t.bg}')" title="Apply theme ${i+1}">
          <div class="swatch-dots">
            <div class="swatch-dot" style="background:${t.bg}"></div>
            <div class="swatch-dot" style="background:${t.accent}"></div>
          </div>
          <span class="swatch-text">Theme ${i+1}</span>
        </button>
      `).join('');
    }

    function exportPNG(transparent) {
      // Save current color theme to history
      saveTheme(
        document.getElementById('accentColor').value,
        document.getElementById('bgColor').value
      );
      const ec = document.createElement('canvas');
      ec.width  = W * 2;
      ec.height = (TOP_H + SUB_H) * 2;
      const et  = ec.getContext('2d');
      if (!transparent) {
        et.fillStyle = document.getElementById('bgColor').value;
        et.fillRect(0, 0, ec.width, ec.height);
      }
      et.drawImage(canvas, 0, 0);
      const a = document.createElement('a');
      a.download = 'scorecard_hole' + document.getElementById('holeNum').value + '.png';
      a.href = ec.toDataURL('image/png');
      a.click();
    }

    document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', render));
    document.fonts.ready.then(() => { render(); renderThemeSwatches(); });
  </script>
</body>
</html>
